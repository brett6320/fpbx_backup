# shellcheck shell=bash
# fpbx-backup configuration
# Sourced as bash. Override defaults here. Keep this file mode 600 (secrets).
#
# Copy to /etc/fpbx-backup.conf on the FusionPBX host, then edit.
# Every value below is a default; uncomment to change.

################################################################################
# Paths on the FusionPBX host
################################################################################

# FusionPBX main config (5.x INI-style, holds DB credentials).
#FPBX_CONFIG="/etc/fusionpbx/config.conf"

# Legacy PHP config (FusionPBX <=4.x, e.g. 4.5.1) using $db_* variables.
# Auto-detected when config.conf is absent; override the path if non-standard.
#FPBX_CONFIG_LEGACY="/etc/fusionpbx/config.php"

# User FreeSWITCH runs as, IF different from OWNER_USER (default www-data).
# Used by --data-only restore to grant group access to voicemail/recordings.
#OWNER_USER="www-data"
#OWNER_GROUP="www-data"
#FS_RUN_USER="freeswitch"

# Directory that receives finished backup archives.
#BACKUP_DIR="/var/backups/fusionpbx"

# Directories included in the file portion of the backup.
# Space-separated. Missing ones are skipped with a warning.
#INCLUDE_ETC_FUSIONPBX="/etc/fusionpbx"
#INCLUDE_ETC_FREESWITCH="/etc/freeswitch"
#INCLUDE_WEBROOT="/var/www/fusionpbx"
#INCLUDE_LETSENCRYPT="/etc/letsencrypt"

# FreeSWITCH variable data: voicemail, recordings, call recordings, storage.
# Can be very large. Set BACKUP_RECORDINGS=no to skip.
#INCLUDE_FS_DATA="/var/lib/freeswitch"
#BACKUP_RECORDINGS="yes"

################################################################################
# Backup mode  (incremental for space-heavy voicemail/recordings)
################################################################################

# full | incremental
# full        : self-contained archive; DB + every included file.
# incremental : DB is always dumped in full, but the file tree only stores
#               files changed since this chain's level-0 full. Voicemail and
#               recordings are not re-copied every run. Override per run with
#               --mode. Restore replays the chain's full + increments in order.
#BACKUP_MODE="full"

# After this many increments, the next run starts a fresh full (new chain) so a
# chain never grows unbounded and restores stay fast. 0 = never force.
#MAX_INCREMENTALS="30"

################################################################################
# Retention
################################################################################

# Delete local backup CHAINS whose newest member is older than this many days.
# Whole chains only — an increment is never orphaned from its full. 0 = keep all.
#RETENTION_DAYS="14"

################################################################################
# Encryption  (applied to every archive at rest)
################################################################################

# none | age | gpg
#ENCRYPTION="age"

# age: recipient public key(s), space separated. Backups encrypted TO these.
# Generate with:  age-keygen -o /root/fpbx-age.key   (keep private key OFFLINE)
#AGE_RECIPIENTS="age1qxyz..."

# gpg: recipient key id / email. Public key must be in root's keyring.
#GPG_RECIPIENT="backup@example.com"

################################################################################
# Offsite copy  (pushed after local archive is written + encrypted)
################################################################################

# none | s3 | rclone | rsync
#OFFSITE="none"

# s3 (uses aws cli). Bucket + optional prefix. Creds via env/instance role.
#S3_BUCKET="my-backups"
#S3_PREFIX="fusionpbx"
#AWS_PROFILE=""

# rclone remote:path (uses rclone config on the host).
#RCLONE_DEST="myremote:fusionpbx"

# rsync destination (user@host:/path or module). Uses ssh.
#RSYNC_DEST="backup@nas.local:/volume1/fusionpbx"
#RSYNC_SSH_KEY="/root/.ssh/id_backup"
